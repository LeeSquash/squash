<!DOCTYPE html>
<html>
<head>
    <title>Live Database Diagnostics</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .profile-card { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 5px; max-width: 650px; }
        h3 { color: #0066cc; margin-top: 0; }
        pre { background: #eee; padding: 10px; overflow-x: auto; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Live Player Database Diagnostic Tool</h1>
    
    <div class="profile-card">
        <h3 id="status-message">Connecting directly to Google Sheets...</h3>
        <p>Testing live data stream for: <strong style="color: blue;">Dan Ngo</strong></p>
        <pre id="visual-output">Contacting Google servers for current season data...</pre>
    </div>

    <script>
        // Create the exact global object and method structure that Google expects to find
        var google = {
            visualization: {
                Query: {
                    setResponse: function(response) {
                        document.getElementById("status-message").innerText = "✔ Connection Successful!";
                        document.getElementById("status-message").style.color = "green";

                        if (response && response.table && response.table.rows) {
                            var rows = response.table.rows;
                            var printBlock = "Total Rows Transmitted: " + rows.length + "\n\n";
                            var foundPlayer = false;

                            // Scan line by line to locate Dan Ngo
                            for (var i = 0; i < rows.length; i++) {
                                if (rows[i] && rows[i].c) {
                                    // Extract raw cell values
                                    var cellStrings = rows[i].c.map(function(cell) {
                                        return cell ? cell.v : "BLANK";
                                    });
                                    
                                    var rowTextLine = cellStrings.join(" | ");
                                    
                                    if (rowTextLine.toLowerCase().indexOf("dan ngo") !== -1) {
                                        foundPlayer = true;
                                        printBlock += "FOUND PLAYER ROW:\n" + rowTextLine + "\n\n";
                                        printBlock += "Raw Data Column Indices:\n";
                                        
                                        for (var j = 0; j < rows[i].c.length; j++) {
                                            var cellVal = rows[i].c[j] ? rows[i].c[j].v : "BLANK";
                                            printBlock += "  Index [" + j + "]: " + cellVal + "\n";
                                        }
                                        break;
                                    }
                                }
                            }
                            
                            if (!foundPlayer) {
                                printBlock += "Connected to the sheet tab, but could not find 'Dan Ngo' anywhere in the rows.";
                            }
                            
                            document.getElementById("visual-output").innerText = printBlock;
                        } else {
                            document.getElementById("visual-output").innerText = "Connected to Google, but returned structure was empty.";
                        }
                    }
                }
            }
        };

        // Target the current season tab using the default Google visualization endpoint
        var targetGid = "177383862";
        var scriptElement = document.createElement('script');
        scriptElement.src = "https://google.com" + targetGid;
        document.body.appendChild(scriptElement);
    </script>

</body>
</html>
