<!DOCTYPE html>
<html>
<head>
    <title>Live Database Diagnostics</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .profile-card { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 5px; max-width: 650px; }
        h3 { color: #0066cc; margin-top: 0; }
        pre { background: #eee; padding: 10px; overflow-x: auto; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Live Player Database Diagnostic Tool</h1>
    
    <div class="profile-card">
        <h3 id="status-message">Connecting directly to Google Sheets...</h3>
        <p>Testing live data stream for: <strong style="color: blue;">Dan Ngo</strong></p>
        <pre id="visual-output">Contacting Google servers for current season data...</pre>
    </div>

    <script>
        // Use a single target season tab (Current Season: 2026/2027) to isolate the connection
        const targetGid = "177383862";
        const baseWorkbookUrl = "https://google.com";

        // Global response handler pathway
        window.googleDiagnosticHandler = function(response) {
            document.getElementById("status-message").innerText = "✔ Connection Successful!";
            document.getElementById("status-message").style.color = "green";

            if (response && response.table && response.table.rows) {
                const rows = response.table.rows;
                let printBlock = "Total Rows Transmitted: " + rows.length + "\n\n";
                
                // Let's find Dan Ngo's raw uncalculated data block
                let foundPlayer = false;
                for (let i = 0; i < rows.length; i++) {
                    if (rows[i] && rows[i].c) {
                        // Extract every cell text value in this row to see the layout array
                        let cellStrings = rows[i].c.map(cell => cell ? cell.v : "BLANK");
                        
                        // Check if Dan Ngo exists in this row row string
                        let rowTextLine = cellStrings.join(" | ");
                        if (rowTextLine.toLowerCase().includes("dan ngo")) {
                            foundPlayer = true;
                            printBlock += "FOUND PLAYER ROW:\n" + rowTextLine + "\n\n";
                            printBlock += "Raw Data Column Indices:\n";
                            rows[i].c.forEach((cell, idx) => {
                                printBlock += "  Index [" + idx + "]: " + (cell ? cell.v : "BLANK") + "\n";
                            });
                            break;
                        }
                    }
                }
                
                if (!foundPlayer) {
                    printBlock += "Connected to the sheet, but could not locate 'Dan Ngo' in the raw text lines.";
                }
                
                document.getElementById("visual-output").innerText = printBlock;
            } else {
                document.getElementById("visual-output").innerText = "Error: Connected to Google, but table structure was empty.";
            }
        };

        // Fire request directly through window scope script injection
        const scriptElement = document.createElement('script');
        scriptElement.src = `${baseWorkbookUrl}?gid=${targetGid}&tqx=responseHandler:window.googleDiagnosticHandler`;
        document.body.appendChild(scriptElement);
    </script>

</body>
</html>
