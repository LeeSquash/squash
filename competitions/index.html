 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Squash Results</title>

    <script>
        // 1. Check if they have already logged in before
        if (localStorage.getItem("committee_gate_passed") !== "true") {
            
            // 2. Prompt for the password
            var password = prompt("Welcome to the Lee squash statistics website.  This website is restricted to competitors.  Please enter the access password:");
            
            // FIX: If the box was blocked by cache/pop-up blockers, or they clicked 'Cancel', reload instead of booting to Google.
            if (password === null || password === "") {
                window.location.reload(); 
            }
            // 3. Only boot them to Google if they typed something AND it was incorrect
            else if (password !== "holdway") {
                alert("Incorrect password. Access denied.");
                window.location.href = "https://google.com"; 
            } 
            // 4. They got it right!
            else {
                localStorage.setItem("committee_gate_passed", "true");
            }
        }
    </script>

    <!-- 5. Redirect to the internal app -->
    <meta http-equiv="refresh" content="0;url=/squash/competitions/home.html">
</head>
<body>
    <p>Redirecting to homepage... <a href="/squash/competitions/home.html">Click here</a> if you are not redirected.</p>
</body>
</html>
