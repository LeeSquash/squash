<!DOCTYPE html>
<html>

<head>
    <title>Generation Cup</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- Empty container where your shared sidebar will load -->
    <div class="sidebar"></div>

    <div class="content">
        <!-- Changed headings to reflect the Generation Cup -->
        <h1>Generation Cup</h1>
        <p>Use the tabs at the bottom of the sheet below to view standings and data for the Generation Cup.</p>

        <div class="sheet-container">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSuUuwaBOHTblWDChHOU6zqdXxEMiTJK70Sy2aSr5RvOjRvmset_Vhc0c6BRnZRK0CPEe2L62RE_qIH/pubhtml?widget=true&amp;headers=false"></iframe>
        </div>
    </div>

   <!-- Clean, simple sidebar fetcher -->
    <script>
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => {
                const sidebar = document.querySelector('.sidebar');
                sidebar.innerHTML = data;
                
                // Finds the hidden script inside your sidebar file and turns it on
                const scripts = sidebar.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    eval(scripts[i].innerText);
                }
            });
    </script>

</body>
</html>
