<!DOCTYPE html>
<html>

<head>
    <title>Squash Levels Team Challenge</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="sidebar">

    </div>

    <div class="content">
        <!-- Changed headings to reflect the Squash Levels Team Challenge -->
        <h1>Squash Levels Team Challenge</h1>
        <p>Use the tabs at the bottom of the sheet below to view standings and data for the Squash Levels Team Challenge.</p>

        <div class="sheet-container">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vR_g4zqP_NIiLNaXtkcJUk4La5q2oPilUxtmXr60EFWBcWqh6L4wcefuhZEG8aWxnHv1CXi_r7i4Ipc/pubhtml?widget=true&amp;headers=false"></iframe>
        </div>
    </div>
<!-- Script that pulls in the sidebar and handles the active page highlight -->
 <!-- Clean, simple sidebar fetcher -->
    <script>
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => {
                const sidebar = document.querySelector('.sidebar');
                sidebar.innerHTML = data;
                
                // Finds the hidden script inside your sidebar file and turns it on
                const scripts = sidebar.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    eval(scripts[i].innerText);
                }
            });
    </script>
</html>
