<!DOCTYPE html>
<html>

<head>
    <title>Wednesday Handicap</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="sidebar">
       
    </div>

    <div class="content">
        <h1>Wednesday Handicap</h1>
        <p>Use the tabs at the bottom of the sheet below to view standings and data from previous years.</p>

        <div class="sheet-container">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSDAwLftQNz6Pz2DqcvPg8AfcXrkZWtJbQTlt7GNNSeZQxkbCiRS4sPdzHjxfcoaNX2sowT98YV1ARq/pubhtml?widget=true&amp;headers=false"></iframe>
        </div>
    </div>

<!-- Clean, simple sidebar fetcher -->
    <script>
        fetch('/components/sidebar.html')
            .then(response => response.text())
            .then(data => {
                const sidebar = document.querySelector('.sidebar');
                sidebar.innerHTML = data;
                
                // Finds the hidden script inside your sidebar file and turns it on
                const scripts = sidebar.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    eval(scripts[i].innerText);
                }
            });
    </script>
</body>
</html>
